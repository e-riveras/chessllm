# LoRA fine-tuning configuration for mlx-lm
# Run via: train/train.sh
# Docs: https://github.com/ml-explore/mlx-examples/blob/main/llms/mlx_lm/LORA.md

# Model (local path set by download_model.py, or HF repo ID)
model: models/Llama-3.2-3B-Instruct-4bit

# Data — directory containing train.jsonl and valid.jsonl
data: data/processed

# Output
adapter_path: adapters/chess-lora

# LoRA
num_layers: 16          # number of transformer layers (from the top) to apply LoRA
                        # rank/scale/dropout configured via fine_tune_type defaults

# Training
batch_size: 2
grad_accumulation_steps: 8   # effective batch = 16
iters: 1000                  # training steps (increase for better results)
val_batches: 25
learning_rate: 2e-4

# Checkpointing / logging
save_every: 200              # save adapter every N steps
steps_per_eval: 100          # run validation every N steps
steps_per_report: 10         # log training loss every N steps

# Gradient checkpointing trades compute for memory — important on 16GB
grad_checkpoint: true

# Sequence length — shorter saves memory; chess comments rarely exceed 512 tokens
max_seq_length: 1024
