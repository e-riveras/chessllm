# LoRA fine-tuning configuration for mlx-lm
# Run via: train/train.sh
# Docs: https://github.com/ml-explore/mlx-examples/blob/main/llms/mlx_lm/LORA.md

# Model (local path set by download_model.py, or HF repo ID)
model: models/Llama-3.2-3B-Instruct-4bit

# Data
train: data/processed/train.jsonl
valid: data/processed/valid.jsonl

# Output
adapter_path: adapters/chess-lora

# LoRA rank — higher = more capacity, more memory
# 8 is a safe default for 16GB; try 16 if you have headroom
lora_rank: 8
lora_scale: 20.0        # alpha / rank — controls effective learning rate of adapters
lora_dropout: 0.05

# Which layers to apply LoRA to
# "all_linear" covers q/k/v/o projections + MLP; good default
lora_layers: 16         # number of transformer layers (from the top) to apply LoRA

# Training
batch_size: 4
grad_accumulation_steps: 4   # effective batch = 16
iters: 1000                  # training steps (increase for better results)
val_batches: 25
learning_rate: 2e-4
lr_schedule: cosine_decay    # cosine_decay | constant | linear

# Checkpointing
save_every: 200              # save adapter every N steps
test_every: 100              # run validation every N steps

# Sequence length — longer = more context, more memory
max_seq_length: 2048
